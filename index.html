<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preeda ซ่อมผ้า ระบบเช็คสถานะ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse สำหรับอ่าน CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .status-step.active .step-circle { background-color: #3b82f6; color: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
        .status-step.completed .step-circle { background-color: #10b981; color: white; }
        .status-step.completed .step-line { background-color: #10b981; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease-in-out; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white shadow-sm py-4">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758a3 3 0 10-4.243 4.243 3 3 0 004.243-4.243zm0-5.758a3 3 0 11-4.243-4.243 3 3 0 014.243 4.243z" />
                    </svg>
                </div>
                <span class="text-xl font-semibold text-gray-800">ตรวจเช็คสถานะซ่อมผ้า</span>
            </div>
            <div class="text-sm text-gray-500">สถานะ: เชื่อมต่อฐานข้อมูลแล้ว</div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-2xl mx-auto px-4 py-10">
        
        <!-- Search Section -->
        <div class="bg-white rounded-2xl shadow-md p-6 mb-8 text-center">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">เช็คสถานะงานซ่อม</h1>
            <p class="text-gray-500 mb-6 text-sm">ค้นหาจากเบอร์โทรศัพท์ หรือ รหัสใบรับงาน</p>
            
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="searchInput" placeholder="เช่น 081234xxxx หรือ TR-001" 
                    class="flex-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="checkStatus()" id="searchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-medium transition-all shadow-lg shadow-blue-200 flex items-center justify-center">
                    <span id="btnText">ตรวจสอบ</span>
                    <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
            </div>
        </div>

        <!-- Result Section -->
        <div id="resultContainer" class="hidden animate-fade">
            <div class="bg-blue-50 border border-blue-100 rounded-2xl p-6 mb-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span id="resOrderId" class="text-xs font-bold text-blue-600 tracking-wider uppercase">-</span>
                        <h2 id="resItemName" class="text-xl font-semibold text-gray-800 mt-1">-</h2>
                    </div>
                    <div id="resBadge" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-medium">-</div>
                </div>
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div>
                        <p class="text-gray-400">วันที่ส่งซ่อม</p>
                        <p id="resDate" class="text-gray-700 font-medium">-</p>
                    </div>
                    <div>
                        <p class="text-gray-400">กำหนดเสร็จ</p>
                        <p id="resDueDate" class="text-gray-700 font-medium text-blue-600">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md p-8 mb-6">
                <div class="flex justify-between items-center relative">
                    <div class="absolute top-5 left-0 w-full h-1 bg-gray-100 z-0"></div>
                    <div id="step1" class="status-step relative z-10 flex flex-col items-center flex-1">
                        <div class="step-circle w-10 h-10 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center mb-2 font-bold transition-all">1</div>
                        <span class="text-[10px] sm:text-xs text-gray-500 font-medium text-center">รับงาน</span>
                    </div>
                    <div id="step2" class="status-step relative z-10 flex flex-col items-center flex-1">
                        <div class="step-circle w-10 h-10 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center mb-2 font-bold transition-all">2</div>
                        <span class="text-[10px] sm:text-xs text-gray-500 font-medium text-center">กำลังซ่อม</span>
                    </div>
                    <div id="step3" class="status-step relative z-10 flex flex-col items-center flex-1">
                        <div class="step-circle w-10 h-10 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center mb-2 font-bold transition-all">3</div>
                        <span class="text-[10px] sm:text-xs text-gray-500 font-medium text-center">เสร็จแล้ว</span>
                    </div>
                    <div id="step4" class="status-step relative z-10 flex flex-col items-center flex-1">
                        <div class="step-circle w-10 h-10 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center mb-2 font-bold transition-all">4</div>
                        <span class="text-[10px] sm:text-xs text-gray-500 font-medium text-center">พร้อมรับคืน</span>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md p-6">
                <h3 class="font-semibold text-gray-800 mb-4 border-b pb-2">รายละเอียด</h3>
                <div class="space-y-3 text-sm">
                    <div class="flex justify-between"><span class="text-gray-500">อาการ:</span><span id="resDetail" class="text-gray-800 font-medium">-</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">ราคา:</span><span id="resPrice" class="text-gray-800 font-bold text-lg text-green-600">-</span></div>
                </div>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorContainer" class="hidden bg-red-50 border border-red-100 rounded-2xl p-6 text-center animate-fade">
            <p id="errorMsg" class="text-red-600 font-medium">ไม่พบข้อมูลงานซ่อม</p>
            <p class="text-red-400 text-xs mt-1">กรุณาตรวจสอบข้อมูลอีกครั้ง หรือติดต่อทางร้าน</p>
        </div>

    </main>

    <script>
        // ลิงก์ที่ได้รับการแก้ไขเพื่อเชื่อมต่อกับ Sheet ID ของคุณโดยตรง
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1Ng3VkUccf7jcD8Dx5ZnYVBGz9x7AKyz8WXIa_ER40No/export?format=csv';

        async function fetchSheetData() {
            return new Promise((resolve, reject) => {
                Papa.parse(SHEET_URL, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (error) => reject(error)
                });
            });
        }

        async function checkStatus() {
            const input = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultContainer = document.getElementById('resultContainer');
            const errorContainer = document.getElementById('errorContainer');
            const errorMsg = document.getElementById('errorMsg');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            
            if (!input) return;

            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            errorContainer.classList.add('hidden');
            resultContainer.classList.add('hidden');

            try {
                const data = await fetchSheetData();
                
                // ฟังก์ชันช่วยดึงค่าแบบไม่สนใจตัวพิมพ์เล็ก/ใหญ่ของหัวตาราง และรองรับหลายภาษา
                const getValue = (obj, aliases) => {
                    for (let alias of aliases) {
                        // ค้นหาคีย์ที่ตรงกันโดยไม่สนใจช่องว่างและตัวพิมพ์
                        const key = Object.keys(obj).find(k => k.trim().toLowerCase() === alias.toLowerCase());
                        if (key && obj[key]) return String(obj[key]).trim();
                    }
                    return '';
                };

                const result = data.find(item => {
                    const id = getValue(item, ['id', 'รหัส', 'รหัสงาน']).toLowerCase();
                    const phone = getValue(item, ['phone', 'เบอร์โทร', 'เบอร์โทรศัพท์']);
                    return id === input || phone === input;
                });

                if (result) {
                    document.getElementById('resOrderId').textContent = getValue(result, ['id', 'รหัส', 'รหัสงาน']);
                    document.getElementById('resItemName').textContent = getValue(result, ['item', 'รายการ', 'สินค้า']);
                    document.getElementById('resBadge').textContent = getValue(result, ['badgeText', 'สถานะข้อความ']) || 'ตรวจสอบสำเร็จ';
                    document.getElementById('resDate').textContent = getValue(result, ['date', 'วันที่รับ']);
                    document.getElementById('resDueDate').textContent = getValue(result, ['due', 'วันนัดรับ']);
                    document.getElementById('resDetail').textContent = getValue(result, ['detail', 'รายละเอียด']);
                    document.getElementById('resPrice').textContent = getValue(result, ['price', 'ราคา']);

                    const statusNum = parseInt(getValue(result, ['status', 'ระดับสถานะ'])) || 1;
                    updateSteps(statusNum);
                    resultContainer.classList.remove('hidden');
                } else {
                    errorMsg.textContent = "ไม่พบข้อมูลสำหรับ: " + input;
                    errorContainer.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Error:", error);
                errorMsg.textContent = "ไม่สามารถเชื่อมต่อ Google Sheets ได้";
                errorContainer.classList.remove('hidden');
                alert("คำแนะนำ: ตรวจสอบว่าคุณได้แชร์ Google Sheets เป็น 'ทุกคนที่มีลิงก์มีสิทธิ์อ่าน' (Anyone with the link can view) แล้วหรือยัง");
            } finally {
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        }

        function updateSteps(currentStatus) {
            for (let i = 1; i <= 4; i++) {
                const step = document.getElementById('step' + i);
                const circle = step.querySelector('.step-circle');
                step.classList.remove('active', 'completed');
                
                if (i < currentStatus) {
                    step.classList.add('completed');
                    circle.innerHTML = '✓';
                } else if (i === currentStatus) {
                    step.classList.add('active');
                    circle.innerHTML = i;
                } else {
                    circle.innerHTML = i;
                }
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkStatus();
        });
    </script>
</body>
</html>
